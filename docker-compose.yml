version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: urban-ladies-db
    environment:
      POSTGRES_USER: urban_user
      POSTGRES_PASSWORD: urban_password
      POSTGRES_DB: urban_ladies_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urban_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
